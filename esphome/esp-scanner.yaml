esphome:
  name: esp-scanner
  friendly_name: esp-scanner
  on_boot:
    priority: -100
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                id: wifi_status_led
                effect: "wifi_connected_pulse"
                brightness: 100%
          else:
            - light.turn_on:
                id: wifi_status_led
                effect: "None"
                brightness: 100%

esp32:
  board: esp32cam
  framework:
    type: esp-idf
psram:
  mode: quad
  speed: 40MHz

# Logging
logger:
  level: debug
  baud_rate: 115200

# Home Assistant API
api:
  encryption:
    key: !secret api_key

# OTA update
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  reboot_timeout: 5min
  on_connect:
    then:
      - light.turn_on:
          id: wifi_status_led
          effect: "wifi_connected_pulse"
          brightness: 100%
  on_disconnect:
    then:
      - light.turn_on:
          id: wifi_status_led
          effect: "None"
          brightness: 100%

captive_portal:

i2c:
  - id: bus_camera
    sda: GPIO26
    scl: GPIO27
    scan: false
    frequency: 100kHz

# Status LED (flash LED)
output:
  - platform: gpio
    pin: 4
    id: gpio_4
  - platform: ledc
    pin: GPIO33
    id: gpio_33_pwm
    frequency: 1000 Hz

light:
  - platform: binary
    name: "ESP32-CAM Flash"
    output: gpio_4
  - platform: monochromatic
    id: wifi_status_led
    name: "ESP32 WiFi Status LED"
    output: gpio_33_pwm
    restore_mode: ALWAYS_ON
    effects:
      - pulse:
          name: "wifi_connected_pulse"
          transition_length: 500ms
          update_interval: 1s

binary_sensor:
  - platform: gpio
    id: pir_presence
    name: "Parking PIR Presence"
    device_class: motion
    pin:
      number: GPIO12
      mode:
        input: true
        pulldown: true

# deep_sleep:
#   id: deep_sleep_ctrl
#   run_duration: 30s
#   sleep_duration: 5min
#   wakeup_pin:
#     number: GPIO12
#     allow_other_uses: true
#   wakeup_pin_mode: KEEP_AWAKE

interval:
  - interval: 5s
    then:
      - lambda: |-
          ESP_LOGD("pir", "Parking PIR Presence: %s", id(pir_presence).state ? "ON" : "OFF");

# Camera configuration (AI-Thinker ESP32-CAM)
esp32_camera:
  name: Parking Camera
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_id: bus_camera

  data_pins:
    - GPIO5
    - GPIO18
    - GPIO19
    - GPIO21
    - GPIO36
    - GPIO39
    - GPIO34
    - GPIO35

  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22

  power_down_pin: GPIO32

  resolution: 640x480
  jpeg_quality: 15
  max_framerate: 5 fps
  idle_framerate: 0.1 fps

  vertical_flip: true
  horizontal_mirror: true

# Camera web server for streaming
esp32_camera_web_server:
  - port: 8080
    mode: stream

# Sensors
sensor:
  - platform: wifi_signal
    name: "ESP32 WiFi Signal"
    update_interval: 60s
